  <!-- Patte -->
  <circle cx="78" cy="278" r="4" fill="#7a3a00"/>
  <circle cx="85" cy="280" r="4" fill="#7a3a00"/>
  <circle cx="92" cy="278" r="4" fill="#7a3a00"/>

  <!-- BRAS DROIT (porte la montre) -->
  <ellipse cx="225" cy="248" rx="17" ry="32" fill="url(#bodyG)" stroke="#000" stroke-width="2.5"/>

