  <!-- Reflet vertical -->
  <path d="M155 198 L155 280" stroke="#ff6a6a" stroke-width="1.2" opacity="0.5"/>
  <!-- Petits rayures diagonales -->
  <path d="M144 210 L168 218 M142 232 L170 240 M141 254 L171 262" stroke="#400000" stroke-width="0.6" opacity="0.45"/>

  <!-- TÊTE -->
  <circle cx="155" cy="130" r="66" fill="url(#headG)" stroke="#5a3a00" stroke-width="2.5"/>

  <!-- OREILLES -->
  <path d="M113 92 Q72 25 100 16 Q128 30 134 86 Z"
        fill="url(#bodyG)" stroke="#000" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M197 92 Q238 25 210 16 Q182 30 176 86 Z"
