<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360">
  <defs>
    <radialGradient id="bodyG" cx="35%" cy="30%" r="80%">
      <stop offset="0%"  stop-color="#ffeb7a"/>
      <stop offset="55%" stop-color="#ffcb05"/>
      <stop offset="100%" stop-color="#b88500"/>
    </radialGradient>
    <radialGradient id="headG" cx="30%" cy="25%" r="85%">
      <stop offset="0%"  stop-color="#fff099"/>
      <stop offset="60%" stop-color="#ffcb05"/>
      <stop offset="100%" stop-color="#c29400"/>
    </radialGradient>
    <radialGradient id="bellyG" cx="50%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#fff8c8"/>
      <stop offset="100%" stop-color="#fae89a"/>
    </radialGradient>
    <radialGradient id="cheekG" cx="40%" cy="40%" r="60%">
      <stop offset="0%"  stop-color="#ff9494"/>
      <stop offset="65%" stop-color="#e91e1e"/>
      <stop offset="100%" stop-color="#900808"/>
    </radialGradient>
    <linearGradient id="tailG" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"  stop-color="#fff099"/>
      <stop offset="55%" stop-color="#ffcb05"/>
      <stop offset="100%" stop-color="#b88500"/>
    </linearGradient>
    <linearGradient id="tieG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6a0000"/>
      <stop offset="50%"  stop-color="#cc1a3a"/>
      <stop offset="100%" stop-color="#6a0000"/>
    </linearGradient>
    <linearGradient id="watchBandG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#444"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <radialGradient id="coffeeG" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#6b3a10"/>
      <stop offset="100%" stop-color="#2a1404"/>
    </radialGradient>
    <radialGradient id="mugG" cx="40%" cy="30%" r="80%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </radialGradient>
  </defs>

  <!-- Ombre au sol -->
  <ellipse cx="155" cy="338" rx="85" ry="8" fill="#000" opacity="0.28"/>

  <!-- Queue éclair (en arrière-plan) -->
  <path d="M222 195 L290 122 L257 140 L298 92 L252 128 L278 178 Z"
