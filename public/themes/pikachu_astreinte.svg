  <!-- Boîtier -->
  <rect x="212" y="266" width="26" height="18" rx="4" fill="#2a2a2a" stroke="#000" stroke-width="1.5"/>
  <!-- Cadran -->
  <circle cx="225" cy="275" r="9" fill="#f5f5f5" stroke="#000" stroke-width="1.5"/>
  <circle cx="225" cy="275" r="7.5" fill="#fff"/>
  <!-- Marqueurs des heures -->
  <circle cx="225" cy="269" r="0.8" fill="#000"/>
  <circle cx="231" cy="275" r="0.8" fill="#000"/>
  <circle cx="225" cy="281" r="0.8" fill="#000"/>
  <circle cx="219" cy="275" r="0.8" fill="#000"/>
  <!-- Aiguilles -->
  <line x1="225" y1="275" x2="225" y2="270" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="225" y1="275" x2="229" y2="276.5" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="225" y1="275" x2="226" y2="278" stroke="#e63946" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="225" cy="275" r="1" fill="#000"/>
  <!-- Couronne (bouton remontoir) -->
  <rect x="238" y="273" width="3" height="4" fill="#2a2a2a"/>

  <!-- Patte droite -->
  <circle cx="218" cy="291" r="4" fill="#7a3a00"/>
  <circle cx="225" cy="293" r="4" fill="#7a3a00"/>
  <circle cx="232" cy="291" r="4" fill="#7a3a00"/>

  <!-- CRAVATE -->
  <!-- Nœud -->
  <path d="M147 178 L163 178 L170 196 L140 196 Z" fill="url(#tieG)" stroke="#400000" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Pli du nœud -->
  <path d="M155 178 L155 196" stroke="#400000" stroke-width="1" opacity="0.6"/>
  <!-- Corps de la cravate -->
  <path d="M140 196 L170 196 L167 230 L172 255 L155 285 L138 255 L143 230 Z"
