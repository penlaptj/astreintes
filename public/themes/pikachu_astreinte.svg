  <!-- Base brune de la queue -->
  <path d="M222 195 L243 175 L228 188 Z" fill="#7a3a00"/>
  <!-- Ombrage queue -->
  <path d="M278 178 L260 160 L252 128 L245 145" fill="#000" opacity="0.18"/>

  <!-- CORPS -->
  <ellipse cx="155" cy="240" rx="72" ry="68" fill="url(#bodyG)" stroke="#5a3a00" stroke-width="2.5"/>
  <!-- Ventre clair -->
  <ellipse cx="155" cy="258" rx="46" ry="40" fill="url(#bellyG)"/>
  <!-- Bandes brunes du dos visibles latéralement -->
  <path d="M92 218 Q86 232 90 246" fill="none" stroke="#7a3a00" stroke-width="4" stroke-linecap="round"/>
  <path d="M218 218 Q224 232 220 246" fill="none" stroke="#7a3a00" stroke-width="4" stroke-linecap="round"/>

  <!-- JAMBES -->
  <ellipse cx="125" cy="308" rx="20" ry="15" fill="url(#bodyG)" stroke="#000" stroke-width="2.5"/>
  <ellipse cx="185" cy="308" rx="20" ry="15" fill="url(#bodyG)" stroke="#000" stroke-width="2.5"/>
  <!-- Détails pattes -->
  <path d="M115 316 L113 322 M125 318 L125 324 M135 316 L137 322" stroke="#5a3a00" stroke-width="2" stroke-linecap="round"/>
  <path d="M175 316 L173 322 M185 318 L185 324 M195 316 L197 322" stroke="#5a3a00" stroke-width="2" stroke-linecap="round"/>

  <!-- BRAS GAUCHE (tient le café) -->
