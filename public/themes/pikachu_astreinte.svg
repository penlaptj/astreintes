  <!-- Pointes noires -->
  <path d="M82 25 Q100 16 115 60 Q102 50 85 38 Z" fill="#1a1a1a"/>
  <path d="M228 25 Q210 16 195 60 Q208 50 225 38 Z" fill="#1a1a1a"/>
  <!-- Intérieur rose des oreilles -->
  <path d="M116 75 Q108 50 116 35 Q126 60 130 80 Z" fill="#ff9999" opacity="0.45"/>
  <path d="M194 75 Q202 50 194 35 Q184 60 180 80 Z" fill="#ff9999" opacity="0.45"/>

  <!-- JOUES -->
  <circle cx="105" cy="150" r="15" fill="url(#cheekG)" stroke="#5a0000" stroke-width="1"/>
  <circle cx="205" cy="150" r="15" fill="url(#cheekG)" stroke="#5a0000" stroke-width="1"/>
  <circle cx="101" cy="146" r="4" fill="#ffd0d0" opacity="0.7"/>
  <circle cx="201" cy="146" r="4" fill="#ffd0d0" opacity="0.7"/>

  <!-- YEUX -->
  <ellipse cx="128" cy="122" rx="9.5" ry="13" fill="#1a1a1a"/>
  <ellipse cx="182" cy="122" rx="9.5" ry="13" fill="#1a1a1a"/>
  <ellipse cx="128" cy="123" rx="6.5" ry="9.5" fill="#3a2300" opacity="0.55"/>
  <ellipse cx="182" cy="123" rx="6.5" ry="9.5" fill="#3a2300" opacity="0.55"/>
  <circle cx="130" cy="117" r="3.5" fill="#fff"/>
  <circle cx="184" cy="117" r="3.5" fill="#fff"/>
  <circle cx="125" cy="127" r="1.6" fill="#fff" opacity="0.8"/>
  <circle cx="179" cy="127" r="1.6" fill="#fff" opacity="0.8"/>

  <!-- NEZ -->
  <ellipse cx="155" cy="146" rx="3.5" ry="2.5" fill="#1a1a1a"/>

  <!-- BOUCHE -->
  <path d="M134 158 Q155 178 176 158" fill="#5a0000" stroke="#000" stroke-width="2" stroke-linejoin="round"/>
  <path d="M145 165 Q155 172 165 165" fill="#ff7878"/>
  <!-- Petite langue -->
  <ellipse cx="155" cy="167" rx="5" ry="2" fill="#e63946"/>

  <!-- CAFÉ (dans la patte gauche) -->
  <!-- Ombre sous la tasse -->
  <ellipse cx="80" cy="293" rx="22" ry="3" fill="#000" opacity="0.22"/>
  <!-- Corps de la tasse -->
  <path d="M60 263 L60 293 Q60 304 72 304 L88 304 Q100 304 100 293 L100 263 Z"
        fill="url(#mugG)" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Anse -->
  <path d="M100 270 Q116 270 116 285 Q116 297 100 297"
        fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Bord de la tasse (ovale) -->
  <ellipse cx="80" cy="263" rx="20" ry="4" fill="#f0f0f0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Surface du café -->
  <ellipse cx="80" cy="263" rx="17" ry="3" fill="url(#coffeeG)"/>
  <!-- Reflet sur le café -->
  <ellipse cx="74" cy="262" rx="6" ry="0.8" fill="#9a6028" opacity="0.6"/>
  <!-- Bandeau cravate sur la tasse -->
  <rect x="62" y="278" width="36" height="6" fill="#1a1a1a" opacity="0.15"/>
  <!-- Vapeur -->
  <path d="M68 254 Q72 248 68 242 Q64 236 68 230" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <path d="M80 252 Q84 246 80 240 Q76 234 80 228" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <path d="M92 254 Q96 248 92 242" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.75"/>

  <!-- Étincelles électriques (alertes) -->
  <path d="M30 70 L18 56 L28 56 L18 40" fill="none" stroke="#fff700"
        stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M260 50 L274 36 L264 36 L274 20" fill="none" stroke="#fff700"
        stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M295 200 L312 188 L300 188 L312 172" fill="none" stroke="#fff700"
        stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
